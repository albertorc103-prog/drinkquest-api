services:
  postgres:
    image: postgres:16-alpine
    container_name: drinkquest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-drinkquest}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drinkquest_secret}
      POSTGRES_DB: ${POSTGRES_DB:-drinkquest}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-drinkquest} -d ${POSTGRES_DB:-drinkquest}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: drinkquest-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: drinkquest-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_secret}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  minio-init:
    image: minio/mc:latest
    container_name: drinkquest-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin_secret};
      mc mb -p local/${MINIO_BUCKET:-drinkquest} || true;
      mc anonymous set download local/${MINIO_BUCKET:-drinkquest}/public || true;
      exit 0;
      "

  # Bandeja SMTP local: UI http://localhost:8025 — captura verify/reset sin Brevo
  mailpit:
    image: axllent/mailpit:latest
    container_name: drinkquest-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    environment:
      MP_MAX_MESSAGES: 500
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: drinkquest-migrate
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-drinkquest}:${POSTGRES_PASSWORD:-drinkquest_secret}@postgres:5432/${POSTGRES_DB:-drinkquest}?schema=public
    entrypoint: ["/app/scripts/docker-migrate.sh"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: drinkquest-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      mailpit:
        condition: service_started
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      SKIP_MIGRATE: "1"
      DATABASE_URL: postgresql://${POSTGRES_USER:-drinkquest}:${POSTGRES_PASSWORD:-drinkquest_secret}@postgres:5432/${POSTGRES_DB:-drinkquest}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MAIL_ENABLED: "true"
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_SECURE: "false"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: ${SMTP_FROM:-noreply@drinkquest.local}
      EMAIL_VERIFY_URL: drinkquest://auth/verify?token={token}
      EMAIL_RESET_URL: drinkquest://auth/reset?token={token}
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
  redis_data:
  minio_data:
