# DrinkQuest API — Render Blueprint (opcional)
# https://render.com/docs/blueprint-spec
#
# PostgreSQL incluido. Redis, R2/S3 y SMTP: servicios externos (ver docs/PRODUCTION_INFRA.md).

services:
  - type: web
    name: drinkquest-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm ci && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: API_PREFIX
        value: api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: drinkquest-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: TRUST_PROXY
        value: "true"
      # ─── Redis (Upstash o Render Key Value) ───
      - key: REDIS_URL
        sync: false
      # ─── Storage S3/R2 ───
      - key: MINIO_ENDPOINT
        sync: false
      - key: MINIO_PORT
        sync: false
      - key: MINIO_USE_SSL
        sync: false
      - key: MINIO_REGION
        sync: false
      - key: MINIO_ROOT_USER
        sync: false
      - key: MINIO_ROOT_PASSWORD
        sync: false
      - key: MINIO_BUCKET
        sync: false
      - key: MINIO_PUBLIC_URL
        sync: false
      # ─── Email SMTP / Brevo API ───
      - key: MAIL_ENABLED
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: EMAIL_VERIFY_URL
        sync: false
      - key: EMAIL_RESET_URL
        sync: false
      # ─── Stripe ───
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_EXPLORER
        sync: false
      - key: STRIPE_PRICE_INTERMEDIATE
        sync: false
      - key: STRIPE_PRICE_LEGEND
        sync: false
      - key: STRIPE_CHECKOUT_SUCCESS_URL
        sync: false
      - key: STRIPE_CHECKOUT_CANCEL_URL
        sync: false
      # ─── Admin seed ───
      - key: SEED_ADMIN_EMAIL
        sync: false
      - key: SEED_ADMIN_PASSWORD
        sync: false

databases:
  - name: drinkquest-db
    plan: free
    databaseName: drinkquest
    user: drinkquest
